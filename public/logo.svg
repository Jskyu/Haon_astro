<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E8C84A"/>
      <stop offset="100%" stop-color="#B8880E"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="44" height="44" rx="10" fill="url(#bg)"/>
  <!-- 내부 보더 (깊이감) -->
  <rect x="2.5" y="2.5" width="39" height="39" rx="8" stroke="white" stroke-width="0.8" stroke-opacity="0.35"/>

  <!-- ㅎ: 점 (상단 원) -->
  <circle cx="14" cy="9" r="3" fill="#0C1F35"/>
  <!-- ㅎ: 원과 첫 번째 선 연결 -->
  <line x1="14" y1="12" x2="14" y2="15" stroke="#0C1F35" stroke-width="2" stroke-linecap="round"/>
  <!-- ㅎ: 첫 번째 가로선 -->
  <line x1="5.5" y1="15" x2="22.5" y2="15" stroke="#0C1F35" stroke-width="2.8" stroke-linecap="round"/>
  <!-- ㅎ: 두 번째 가로선 -->
  <line x1="5.5" y1="21" x2="22.5" y2="21" stroke="#0C1F35" stroke-width="2.8" stroke-linecap="round"/>

  <!-- ㅏ: 세로선 (전체 높이) -->
  <line x1="30" y1="8" x2="30" y2="36" stroke="#0C1F35" stroke-width="2.8" stroke-linecap="round"/>
  <!-- ㅏ: 가로 가지 (오른쪽) -->
  <line x1="30" y1="22" x2="38.5" y2="22" stroke="#0C1F35" stroke-width="2.8" stroke-linecap="round"/>
</svg>
